<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Admin Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button id="loginBtn">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

    <h1>Game Admin Dashboard</h1>

    <div class="form-card">

        <h2>Add / Edit Game</h2>

        <input type="text" id="gameName" placeholder="Game Name">
        <input type="text" id="version" placeholder="Version">

        <input type="file" id="iconFile" accept="image/*">
        <img id="iconPreview">

        <input type="text" id="downloadLink" placeholder="Download Link">

        <textarea id="features" placeholder="One mod feature per line"></textarea>

        <button id="addGameBtn">Add Game</button>

    </div>

    <h2>Manage Games</h2>
    <div id="gamesList"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>iStudGamer.com</title>

    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>
            <span class="logo-white">iStud</span><span class="logo-blue">Gamer.com</span>
        </h1>

        <div class="top-buttons">

            <a href="https://t.me/YOUR_CHANNEL" class="telegram-btn" target="_blank">
                ✈️ Join Telegram
            </a>

            <a href="https://youtube.com/YOUR_VIDEO" class="youtube-btn" target="_blank">
                ▶️ How To Download
            </a>

        </div>
    </header>

    <section class="search-section">
        <input
            type="text"
            id="searchBox"
            placeholder="Search Games..."
        >
    </section>

    <section id="gamesContainer" class="games-grid">
        <!-- Games load from Firestore -->
    </section>

    <!-- Mod Features Popup -->
    <div id="popup" class="popup">
        <div class="popup-content">
            <span id="closePopup">&times;</span>

            <h3>Mod Features</h3>

            <ul id="featuresList"></ul>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>

</body>
</html>
